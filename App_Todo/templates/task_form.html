{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm p-4">

<h2>
    {% if task %}Edit Task{% else %}Create Task{% endif %}
</h2>

{% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
{% endif %}

<form method="post">
    {% csrf_token %}

    <!-- Title -->
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control"
               value="{{ task.title|default:'' }}">
    </div>

    <!-- Description -->
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4">
            {{ task.description|default:'' }}
        </textarea>
    </div>

    <!-- 🔥 NEW: Date -->
    <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control"
               value="{{ task.date|default:'' }}">
    </div>

    <!-- 🔥 NEW: Hours -->
    <div class="mb-3">
        <label class="form-label">Study Hours</label>
        <input type="number" name="hours" class="form-control"
               value="{{ task.hours|default:0 }}">
    </div>

    <!-- Completed -->
    {% if task %}
    <div class="form-check mb-3">
        <input type="checkbox" name="completed" class="form-check-input"
               {% if task.completed %}checked{% endif %}>
        <label class="form-check-label">Completed</label>
    </div>
    {% endif %}

    <!-- Buttons -->
    <button type="submit" class="btn btn-primary">
        Save Task
    </button>

    <a href="{% url 'App_Todo:task_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

</div>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-light bg-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'App_Todo:task_list' %}">
                🗒️ Django Todo App
            </a>

            <div class="d-flex align-items-center gap-2">
                <!-- Dashboard Link -->
                <a href="{% url 'App_Todo:dashboard' %}" class="btn btn-outline-secondary btn-sm">
                    📊 Dashboard
                </a>

                {% if user.is_authenticated %}
                    <!-- Weekly Report -->
                    <a href="{% url 'App_Todo:weekly_report' %}" class="btn btn-outline-info btn-sm">
                        📧 Weekly Report
                    </a>
                    <!-- Username -->
                    <span class="navbar-text">👤 {{ user.username }} 
                        🔥 </span>
                    <!-- Add Task -->
                    <a href="{% url 'App_Todo:task_create' %}" class="btn btn-primary btn-sm">
                        Add Task
                    </a>
                    <!-- Logout -->
                    <a href="{% url 'App_Todo:logout' %}" class="btn btn-outline-danger btn-sm">
                        Logout
                    </a>
                {% else %}
                    <a href="{% url 'App_Todo:login' %}" class="btn btn-outline-primary btn-sm">
                        Login
                    </a>
                    <a href="{% url 'App_Todo:register' %}" class="btn btn-outline-success btn-sm">
                        Register
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
